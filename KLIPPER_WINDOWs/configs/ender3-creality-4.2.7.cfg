# =============================================================
# printer.cfg - Ender 3 / Ender 3 Pro  +  Creality 4.2.7
# MCU: STM32F103 RET6  |  Firmware: 28KiB bootloader, USART1
# Cama: 235x235  |  Altura max: 250mm
# Diferencia vs 4.2.2: drivers TMC2225 (mas silenciosos)
# =============================================================

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PA7
position_endstop: 0
position_max: 250

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 34.406
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_pin: PA0
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260

[heater_bed]
heater_pin: PA2
sensor_pin: PA4
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 690.34
pid_Ki: 111.47
pid_Kd: 1068.67
min_temp: 0
max_temp: 120

[fan]
pin: PA3

[mcu]
serial: /dev/ttyUSB0
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

[display]
lcd_type: st7920
cs_pin: PB12
sclk_pin: PB13
sid_pin: PB15
encoder_pins: ^PB14, ^PB10
click_pin: ^!PB2

[output_pin beeper]
pin: PC6
pwm: True
value: 0
shutdown_value: 0
cycle_time: 0.001

[force_move]
enable_force_move: True

[board_pins]
aliases:
    EXP1_1=PB14, EXP1_2=PB13, EXP1_3=PB12, EXP1_4=PB15,
    EXP1_5=PB2,  EXP1_6=PB10, EXP1_7=?,    EXP1_8=?,
    EXP2_1=PA15, EXP2_2=?,    EXP2_3=PA1,  EXP2_4=PA3,
    EXP2_5=PA2,  EXP2_6=?,    EXP2_7=?,    EXP2_8=?

[include macros_recovery.cfg]
