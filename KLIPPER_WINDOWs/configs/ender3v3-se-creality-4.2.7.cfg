# =============================================================
# printer.cfg - Ender 3 V3 SE  +  Creality 4.2.7
# MCU: STM32F103 RET6  |  Firmware: 28KiB bootloader, USART1
# Cama: 220x220  |  Altura max: 250mm
# Diferencias: sensor CR Touch integrado, extrusor directo
# =============================================================
# IMPORTANTE: Esta placa viene con CR Touch de fabrica.
# Si tu V3 SE NO tiene CR Touch, comentar la seccion [bltouch]
# y descomentar el endstop Z estandar en [stepper_z]
# =============================================================

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 220
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 220
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
# Con CR Touch activo usar esta linea:
endstop_pin: probe:z_virtual_endstop
# Sin CR Touch, comentar la de arriba y descomentar esta:
# endstop_pin: ^PA7
# position_endstop: 0
position_max: 250
position_min: -3

[extruder]
# Extrusor directo (sprite extruder)
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.805
# NOTA: rotation_distance del extrusor directo es diferente al bowden
# Calibrar con: https://www.klipper3d.org/Rotation_Distance.html
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_pin: PA0
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260

[heater_bed]
heater_pin: PA2
sensor_pin: PA4
sensor_type: EPCOS 100K B57560G104F
control: pid
pid_Kp: 690.34
pid_Ki: 111.47
pid_Kd: 1068.67
min_temp: 0
max_temp: 120

[fan]
pin: PA3

[mcu]
serial: /dev/ttyUSB0
baud: 250000
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

# =============================================================
# CR Touch / BL Touch
# Descomentar si tu impresora tiene sensor de nivelacion
# =============================================================
[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -31.8
y_offset: -40.5
z_offset: 2.0
# Calibrar z_offset con: PROBE_CALIBRATE

[safe_z_home]
home_xy_position: 141.8, 150.5
speed: 50
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 80
horizontal_move_z: 5
mesh_min: 18, 18
mesh_max: 188, 180
probe_count: 5,5
mesh_pps: 2,2
algorithm: bicubic

[force_move]
enable_force_move: True

[board_pins]
aliases:
    EXP1_1=PB14, EXP1_2=PB13, EXP1_3=PB12, EXP1_4=PB15,
    EXP1_5=PB2,  EXP1_6=PB10, EXP1_7=?,    EXP1_8=?,
    EXP2_1=PA15, EXP2_2=?,    EXP2_3=PA1,  EXP2_4=PA3,
    EXP2_5=PA2,  EXP2_6=?,    EXP2_7=?,    EXP2_8=?

[include macros_recovery.cfg]
