# =============================================================
# MACROS DE RECUPERACION DE IMPRESION
# Incluidas automaticamente en todos los printer.cfg
# =============================================================

[save_variables]
filename: ~/printer_data/config/variables.cfg

[display_status]
[pause_resume]
[virtual_sdcard]
path: ~/printer_data/gcodes

[delayed_gcode _POWER_LOSS_MONITOR]
initial_duration: 10.
gcode:
  {% if printer.print_stats.state == "printing" %}
    _SAVE_PRINT_STATE
    UPDATE_DELAYED_GCODE ID=_POWER_LOSS_MONITOR DURATION=5.
  {% endif %}

[gcode_macro _SAVE_PRINT_STATE]
gcode:
  {% set state = {
      'pos_x': printer.toolhead.position.x,
      'pos_y': printer.toolhead.position.y,
      'pos_z': printer.toolhead.position.z,
      'pos_e': printer.toolhead.position.e,
      'extruder_temp': printer.extruder.target,
      'bed_temp': printer.heater_bed.target,
      'file_name': printer.print_stats.filename,
      'file_position': printer.print_stats.file_position
    } %}
  SAVE_VARIABLE VARIABLE=power_loss_state VALUE={state}

[gcode_macro RECOVER_PRINT]
description: Reanudar desde ultimo estado guardado
gcode:
  {% set state = printer.save_variables.variables.power_loss_state %}
  {% if not state %}
    RESPOND TYPE=error MSG="No hay estado guardado. Usar MANUAL_RECOVER"
  {% else %}
    RESPOND MSG="Recuperando: X={state.pos_x} Y={state.pos_y} Z={state.pos_z} archivo={state.file_name}"
    G28 X Y
    G1 X{state.pos_x - 20} Y{state.pos_y - 20} F6000
    G1 Z{state.pos_z + 5} F300
    M140 S{state.bed_temp}
    M109 S{state.extruder_temp}
    G91
    G1 Z-5 F60
    G90
    G92 E{state.pos_e}
    G1 E{state.pos_e + 2} F60
    M400
    M117 Recuperando...
    SDCARD_PRINT_FILE FILENAME={state.file_name}
    M400
    RESPOND MSG="Reanudando desde posicion {state.file_position}"
  {% endif %}

[gcode_macro SHOW_SAVED_STATE]
description: Mostrar ultimo estado guardado
gcode:
  {% set state = printer.save_variables.variables.power_loss_state %}
  {% if not state %}
    RESPOND MSG="No hay estado guardado"
  {% else %}
    RESPOND MSG="=== ESTADO GUARDADO ==="
    RESPOND MSG="X={state.pos_x} Y={state.pos_y} Z={state.pos_z} E={state.pos_e}"
    RESPOND MSG="Hotend={state.extruder_temp}C Cama={state.bed_temp}C"
    RESPOND MSG="Archivo: {state.file_name}"
    RESPOND MSG="Posicion archivo: {state.file_position}"
  {% endif %}

[gcode_macro MANUAL_RECOVER]
description: Reanudar ingresando posicion manual (mirar klippy.log)
gcode:
  {% set state = printer.save_variables.variables.power_loss_state %}
  RESPOND MSG="Ejemplo: SET_RECOVERY_STATE X=144.87 Y=103.58 Z=3.8 E=0 FILE=archivo.gcode POS=123456"
  {% if state %}
    RESPOND MSG="Ultimo guardado: X={state.pos_x} Y={state.pos_y} Z={state.pos_z}"
  {% else %}
    RESPOND MSG="Sin estado previo. Revisar klippy.log para coordenadas"
  {% endif %}

[gcode_macro SET_RECOVERY_STATE]
description: Fijar estado manual para recuperacion
gcode:
  {% set new_state = {
      'pos_x': params.X|default(0)|float,
      'pos_y': params.Y|default(0)|float,
      'pos_z': params.Z|default(0)|float,
      'pos_e': params.E|default(0)|float,
      'extruder_temp': params.HOTEND|default(200)|float,
      'bed_temp': params.BED|default(60)|float,
      'file_name': params.FILE|default(''),
      'file_position': params.POS|default(0)|int
    } %}
  SAVE_VARIABLE VARIABLE=power_loss_state VALUE={new_state}
  RESPOND MSG="Estado guardado manualmente. Ejecutar RECOVER_PRINT para reanudar"

[gcode_macro CLEAR_RECOVERY]
description: Limpiar estado guardado
gcode:
  SAVE_VARIABLE VARIABLE=power_loss_state VALUE=""
  RESPOND MSG="Estado de recuperacion limpiado"
